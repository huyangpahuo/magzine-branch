# Site Settings
favicon: /images/favicon.ico
logo: /images/0.png
# 首页图
# Hero Section
hero:
  enable: false  # 是否开启首页图片
  background_image: /images/11.webp
  typing_text: Where there's a will there's a way kind of beautiful
  typing_speed: 100
  delete_speed: 50
  pause_duration: 2000
  scroll_hint: 向下滚动探索更多

# Article List 首页文章卡片大小
article_list:
  card_size: normal  # normal or large
  view_mode: "modal"  # 文章浏览方式: "redirect"(跳转模式) 或 "modal"(模态窗口模式)

# Colors 颜色配置
colors:
  primary: '#1a1a1a'
  secondary: '#666666'
  accent: '#ff6b6b' # 主题色
  background: '#ffffff'
  text: '#333333'
  overlay: 'rgba(0, 0, 0, 0.7)'
  tag_background: '#ffffff'  # 首页标签背景色
  card_background: '#ffffff'  # 首页文章卡片背景色

# Typography 字体配置
fonts:
  primary: 'Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
  secondary: 'Playfair Display, Georgia, serif'
  monospace: 'Fira Code, Monaco, Consolas, monospace'

# Layout 布局配置
layout:
  max_width: 1400px
  sidebar_width: 300px
  content_padding: 2rem


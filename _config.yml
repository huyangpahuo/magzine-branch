# Sakana 小人摆件组件
sakana:
  enable: true  # 是否启用sakana小人摆件组件

# 调色板组件 (主题色切换)
color_picker:
  enable: true  # 是否开启右上角主题调色板

# 字数统计与阅读时长 (需安装插件: npm install hexo-wordcount)
wordcount:
  enable: true  # 是否在文章元数据区域显示字数和预计阅读时间

# 桌面宠物配置
pet:
  enable: true  # 设为 false 即可关闭桌宠
  pretext_interaction:
    enable: true             # 是否开启文字避让/穿梭效果
    repel_radius: 60         # 桌宠排斥文字的半径（像素）
    throttle_ms: 50          # 性能优化：节流时间（毫秒），数值越大越流畅但不够跟手


# Music Player (悬浮音乐播放器)
#音乐配置文件为music.yml,请前往source/_data/music.yml文件修改
music_player:
  enable: true   #是否启用音乐播放器
  style: "pill"  #播放器形态: "pill" (圆条型) 或 "card" (卡片模式)
  pc_position: "header" # PC端位置: "header"(塞入导航菜单作者名字右侧) 或 "floating"(默认左上角且自由拖拽)
  autoplay: false
  default_cover: /images/0.png
  opacity: 0.80

# Features (功能)
features:
  dark_mode: true  # 是否开启暗黑模式
  smooth_scroll: true
  back_to_top: true  # 是否开启返回顶部按钮
  loading_animation: true  # 是否开启加载动画，默认关闭,如果你喜欢可以改为true开启,但是会增加页面加载时间

# Code Block Settings (代码高亮)
code_block:
  height_limit: 200  # 代码块高度限制，超过此高度显示展开按钮
  enable_folding: true  # 启用代码折叠功能
  max_height: 300px  # 代码块最大高度（像素）
  show_lang: true  # 是否在代码块上方工具栏显示代码语言（默认true）



# Author Card (作者卡片)
author_card:
  enable: true
  avatar:  /images/0.png
  name: 胡杨怕火
  bio: 传递笑容魔法的Ciallo～(∠・ω< )⌒☆
  button_text: 关于我
  button_link: /about/
  background_image: "/images/13.jpg"
  width: large # normal or large
  # 作者卡片背景动画
  background_animation:
    enable: false  # 默认为false，启用后会在没有背景图片时显示动态背景
    type: geometric  # 背景动画类型：particles, geometric, gradient
    color_scheme: auto  # 颜色方案：auto（自动跟随主题）、light、dark
    interactive: true  # 是否启用鼠标交互效果
    density: high  # 动画元素密度：low, medium, high



# Comments (optional)
comments:
  enable: true
  type: twikoo # disqus, gitalk, valine, twikoo
  shortname:
  # Twikoo configuration
  twikoo:
    envId: # Your environment ID
    region: # Your service region, e.g. ap-guangzhou
    path: window.location.pathname  # Default is window.location.pathname
    visitor: true  # Enable visitor count
    option: # Additional options

    
# Share buttons (optional)
share:
  enable: true
  options:
    twitter: true
    facebook: true
    linkedin: true
    copy_link: true
    wechat: true
    qq: true
    weibo: true
    option: # Additional options

# 在 _config.yml 底部添加
anime:
  # 播放器解析接口，如果是B站官方URL，可以用下面这个，或者替换为其他的免费外接源接口
  # 例如: "https://jx.playerjy.com/?url=" 等全网解析接口
  #默认使用哔哩哔哩播放源(无需更改,因为配置文件是anime.yml,而不是_config.yml,这里为默认值),请前往source/_data/anime.yml文件修改
  player_api: "https://player.bilibili.com/player.html?bvid=" 
  # 是否开启历史记录功能（在卡片右下角显示"已观看"）
  history: true

# Theme Configuration
theme_config:
  # 文章设置
  post:
    excerpt_length: 200  # 文章摘要长度
    read_more: "阅读更多"  # 阅读更多按钮文字
    use_default_cover: true  # 当文章未设置封面时是否使用默认封面
    default_cover: "/images/19.png"  # 默认封面图片路径


  # 统计分析
  analytics:
    enabled: false
    google_analytics_id: ""
    baidu_analytics_id: ""

 # 搜索功能,需要安装hexo-generator-search插件,执行npm install hexo-generator-search
  # 然后前往hexo根目录的_config.yml文件(不是你现在看的这个文件)最底部添加以下内容
  #----------------------------
    #search:
      #path: search.json 
      #field: post
      #content: true
      #format: html
  #----------------------------
  search:
    enabled: true
    provider: "local"  # local, algolia
    algolia_app_id: ""
    algolia_api_key: ""
    algolia_index_name: ""



  # 性能优化
  performance:
    # 图片懒加载
    lazyload: true
    # 代码压缩
    minify: true
    # 缓存
    cache: true

# 图片压缩功能 (需安装 sharp 依赖: npm install sharp)
# 注意:触发压缩的方法为先hexo clean清理public文件夹,然后连续执行两次hexo generate命令,第一次是生成图片,第二次才会触发压缩,最后hexo deploy发布
# 或者执行hexo clean + hexo generate + hexo server命令,在本地预览时触发压缩,然后直接hexo deploy发布
compress_images:
  enable: true        # 是否开启图片压缩 (默认关闭，改为 true 开启)
  min_size: 10240      # 最小压缩大小，小于此大小(10KB)的图片不压缩
  ignore: []           # 忽略的图片格式，例如: ['.gif', '.svg']
  quality:             # 各种格式的压缩质量 (0-100)
    jpeg: 60
    png: 60
    webp: 70
    avif: 60
    gif: 60

# Custom code injection
inject:
  head:
    # Custom CSS
    # - <link rel="stylesheet" href="/css/custom.css" media="defer" onload="this.media='all'">
    - <link rel="stylesheet" href="https://cdn1.tianli0.top/gh/qxchuckle/Post-Summary-AI/chuckle-post-ai.css"> #AI
    - <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  bottom:
    # Custom JavaScript
    # - <script src="/js/xxx"></script>
    - <script src="/js/ai.js"></script> #ai
    - <script src="/js/postai.js"></script> #ai
    #以下是数学公式支持
    - <script src="/js/math-support.js"></script>  # 数学公式
    #以下是鼠标点击效果,仅可启用一个
    - <script src="/js/click-heart.js"></script> # 鼠标点击爱心文字特效
    # - <script src="/js/click-fireworks.js"></script> # 鼠标点击三角烟花特效
    
    #以下是背景动画特效
    - <script src="/js/falling-leaves.js"></script> # 梧桐落叶特效
    #以下是语言切换支持
    - <script src="/js/lang-switch.js"></script> # 语言切换脚本
    
    # 引入 PJAX 实现无刷新加载
    # - <script src="https://cdn.jsdelivr.net/npm/pjax@0.2.8/pjax.min.js"></script>
    # - <script src="/js/pjax-init.js"></script>
    
# 语言切换功能
#本主题翻译功能不是很成熟,不满足i18n需求,只满足中英转换,请前往themes\magzine\source\js\lang-switch.js自定义翻译文本
#结合浏览器翻译插件---沉浸式翻译(https://immersivetranslate.com/en/)  体验更佳


# AI摘要配置
ai_summary:
  enable: true  # 是否启用AI摘要功能，默认关闭
  api_key: ""  # 这里不要填任何东西,详细部署教程请参考：https://2am.top/2025/12/22/Workers%E5%AE%9E%E7%8E%B0Api%E7%99%BD%E5%90%8D%E5%8D%95/
  summary_directly: false  # 是否直接生成摘要，默认为false（需要点击按钮生成）
  # 其他可选配置
  ai_name: "阿罗娜"  # AI名称
  ai_introduce: "老师好, 我是阿罗娜, 一个基于OpenAI GPT-4o的强大语言模型, 今天有什么可以帮到您? 😊"  # AI介绍语
  ai_version: "OpenAI GPT-4o"  # AI版本显示,什么,你说是GPT-4o,没错,我就是挂羊头卖狗肉 [狗头][狗头][狗头]
  # 按钮文本
  buttons:
    - "介绍自己"
    - "来点灵感"
    - "生成AI简介"

# Categories Page 分类页样式
categories:
  layout: accordion  # accordion (展开式) or page (跳转式)
  accordion_animation: true  # 是否启用展开/折叠动画
  show_empty_categories: true  # 是否显示没有文章的分类


# Table of Contents (目录) 设置
toc:
  # 当没有目录时的显示方式
  # hide: 隐藏目录侧边栏，并调整主内容区域宽度为全屏
  # placeholder: 保持目录侧边栏占位，但隐藏目录内容
  empty_toc_behavior: placeholder  # hide 或 placeholder


CDN:
  # The CDN provider of internal scripts (主题内部 js 的 cdn 配置)
  # option: local/elemecdn/jsdelivr/unpkg/cdnjs/onmicrosoft/cbd/anheyu/custom
  # Dev version can only choose. ( dev版的主题只能设置为 local )
  internal_provider: local

  # The CDN provider of third party scripts (第三方 js 的 cdn 配置)
  # option: elemecdn/jsdelivr/unpkg/cdnjs/onmicrosoft/cbd/anheyu/custom
  third_party_provider: unpkg

  # Add version number to CDN, true or false
  version: true

  # Custom format
  # For example: https://cdn.staticfile.org/${cdnjs_name}/${version}/${min_cdnjs_file}
  custom_format: # https://npm.elemecdn.com/${name}@latest/${file}

  option: